name: Générer les pages recettes

on:
  schedule:
    - cron: '0 3 * * *'  # Toutes les nuits à 3h
  workflow_dispatch:       # Déclenchable manuellement

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer les pages
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
        run: node scripts/generate-recipe-pages.js

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recettes/ sitemap.xml
          git diff --staged --quiet || git commit -m "🍽️ Mise à jour des pages recettes"
          git push
